<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Driftless animation library">
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a2230"/><stop offset="1" stop-color="#040f18"/>
    </linearGradient>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fe0d8" stop-opacity="0"/><stop offset="1" stop-color="#5fe0d8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#g4)"/>
  <text x="48" y="78" font-family="monospace" font-size="13" fill="#5fe0d8" letter-spacing="4">DRIFTLESS</text>
  <text x="48" y="100" font-family="monospace" font-size="11" fill="#3f6a73" letter-spacing="2">motion that feels weighted</text>
  <!-- weighted easing arcs -->
  <g fill="none" stroke-width="2.5">
    <path d="M90 470 C 250 470, 300 180, 520 180" stroke="url(#trail)"/>
    <path d="M90 470 C 280 470, 360 260, 520 260" stroke="url(#trail)" opacity="0.55"/>
    <path d="M90 470 C 320 470, 430 340, 520 340" stroke="url(#trail)" opacity="0.3"/>
  </g>
  <g fill="#5fe0d8">
    <circle cx="520" cy="180" r="14"/><circle cx="520" cy="260" r="10" opacity="0.6"/><circle cx="520" cy="340" r="7" opacity="0.35"/>
  </g>
  <g fill="#0a2230" font-family="monospace" font-size="13" font-weight="bold">
    <text x="514" y="185">↗</text>
  </g>
  <g stroke="#16414c" stroke-width="1"><line x1="90" y1="470" x2="710" y2="470"/></g>
  <text x="600" y="500" font-family="monospace" font-size="11" fill="#3f6a73" letter-spacing="2">3.1kb · zero deps</text>
</svg>
